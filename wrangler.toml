name = "ai-price-compare"
main = "src/worker/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# 静态资源配置
[assets]
directory = "./dist"
not_found_handling = "404-page"

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "ai-price-compare"
database_id = "your-database-id-here"

# KV 命名空间配置
[[kv_namespaces]]
binding = "KV"
id = "your-kv-id-here"

# 环境变量
[vars]
ADMIN_KEY = "your-secret-admin-key"

# 生产环境配置
[env.production]
name = "ai-price-compare"
vars = { ADMIN_KEY = "your-production-admin-key" }

# 开发环境配置
[env.development]
name = "ai-price-compare-dev"
vars = { ADMIN_KEY = "dev-admin-key" }
